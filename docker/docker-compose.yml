services:
  postgres:
    image: postgres:17
    container_name: matei-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-matei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-matei_dev}
      POSTGRES_DB: ${POSTGRES_DB:-matei}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-matei}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - matei

  backend:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: matei-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: ${API_PORT:-3001}
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-matei}
      PGPASSWORD: ${POSTGRES_PASSWORD:-matei_dev}
      PGDATABASE: ${POSTGRES_DB:-matei}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      COLLECTOR_INTERVAL_MS: ${COLLECTOR_INTERVAL_MS:-30000}
      COLLECTOR_WORKERS: ${COLLECTOR_WORKERS:-40}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - matei

  frontend:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: matei-frontend
    restart: unless-stopped
    environment:
      VITE_API_TARGET: http://backend:3001
    ports:
      - "5173:5173"
    networks:
      - matei

  nginx:
    image: nginx:alpine
    container_name: matei-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - matei

volumes:
  pgdata:

networks:
  matei:
    driver: bridge
